<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>مبروك الفوز 🎉</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    /* لمسة بسيطة داخلية (بدون ما نكبّر style.css) */
    .winnerWrap{position:relative; overflow:hidden}
    #confettiCanvas{position:absolute; inset:0; width:100%; height:100%; pointer-events:none}
    .winnerHero{
      padding:18px;
      border-radius: var(--r);
      border:1px solid var(--stroke);
      background: linear-gradient(180deg, rgba(108,92,231,0.10), #ffffff);
      box-shadow: var(--shadow);
    }
    .winnerTitle{font-size:28px; font-weight:950; margin:0 0 6px 0}
    .winnerSub{color:var(--muted); margin:0; line-height:1.8}
    .winBadge{
      display:inline-flex; align-items:center; gap:8px;
      padding:8px 12px; border-radius:999px;
      border:1px solid rgba(245,158,11,0.25);
      background: rgba(245,158,11,0.10);
      font-weight:900;
      margin-top:12px;
    }
    .formRow{display:grid; grid-template-columns:1fr 1fr; gap:12px}
    @media (max-width:720px){ .formRow{grid-template-columns:1fr} }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand brand--small">
        <img class="brand__logo" src="assets/images/logo.png" alt="الشعار" onerror="this.style.display='none'" />
        <div class="brand__txt">
          <div class="brand__title">🎊 احتفال الفوز</div>
          <div class="brand__sub" id="sessionLine">—</div>
        </div>
      </div>

      <div class="topbar__actions">
        <a class="btn btn--ghost btn--sm" href="questions.html">رجوع للأسئلة</a>
        <button id="btnLogout" class="btn btn--ghost btn--sm" type="button">تسجيل خروج</button>
      </div>
    </header>

    <main class="container winnerWrap">
      <canvas id="confettiCanvas"></canvas>

      <section class="card winnerHero">
        <h1 class="winnerTitle" id="winnerTitle">مبروك! 🏆</h1>
        <p class="winnerSub" id="winnerLine">—</p>
        <div class="winBadge">هدف الفوز: <span id="targetVal">50</span> نقطة</div>

        <div class="divider"></div>

        <div class="row row--wrap">
          <button id="btnContinue" class="btn btn--primary" type="button">نكمل باقي الأسئلة</button>
          <button id="btnNewTeams" class="btn btn--ghost" type="button">فريق جديد يكمل على المتبقي</button>
        </div>

        <div id="newTeamsBox" style="display:none; margin-top:14px;">
          <div class="divider"></div>
          <div class="card__title">أسماء الفرق الجديدة</div>
          <div class="muted">النقاط تبدأ من صفر، والأسئلة المقفولة تظل مقفولة.</div>

          <div class="formRow" style="margin-top:12px;">
            <div class="field">
              <div class="label">اسم الفريق الأول</div>
              <input id="teamA" class="input" placeholder="مثال: فريق 1" />
            </div>
            <div class="field">
              <div class="label">اسم الفريق الثاني</div>
              <input id="teamB" class="input" placeholder="مثال: فريق 2" />
            </div>
          </div>

          <div class="row row--wrap" style="margin-top:12px;">
            <button id="btnStartNewTeams" class="btn btn--primary" type="button">ابدأ بالفريقين الجديدين</button>
            <button id="btnCancelNewTeams" class="btn btn--ghost" type="button">إلغاء</button>
          </div>

          <div class="status" id="statusBox" style="margin-top:10px;"></div>
        </div>
      </section>

      <section class="card">
        <div class="row row--space row--wrap">
          <div class="scorebar" id="scorebar"></div>
          <div class="muted">تقدر تقفل التبويب بعد اختيارك.</div>
        </div>
      </section>
    </main>

    <footer class="footer">
      <div class="muted">احتفال بسيط • بدون مكتبات خارجية</div>
    </footer>
  </div>

  <script src="js/common.js"></script>
  <script src="js/winner.js"></script>
</body>
</html>
