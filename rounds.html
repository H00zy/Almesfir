<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>لعبة العائلة - اختيار الجولة</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand brand--small">
        <img class="brand__logo" src="assets/images/logo.png" alt="الشعار" onerror="this.style.display='none'" />
        <div class="brand__txt">
          <div class="brand__title">اختيار الجولة</div>
          <div class="brand__sub" id="sessionLine">—</div>
        </div>
      </div>

      <div class="topbar__actions">
        <button id="btnNewGame" class="btn btn--ghost btn--sm" type="button">لعبة جديدة</button>
        <button id="btnLogout" class="btn btn--ghost btn--sm" type="button">تسجيل خروج</button>
      </div>
    </header>

    <main class="container">

      <section class="card">
        <div class="row row--space row--wrap">
          <div>
            <div class="card__title">اختر فئة ثم Round</div>
            <div class="muted">كل Round يحتوي 4 أسئلة — عند إغلاقها كلها يصبح الـ Round مقفل.</div>
          </div>

          <div class="scorebar" id="scorebar"></div>
        </div>

        <div class="divider"></div>

        <div class="progressWrap">
          <div class="muted" id="progressLine">—</div>
          <div class="progressBar" aria-hidden="true">
            <div class="progressBar__fill" id="progressFill" style="width:0%"></div>
          </div>
        </div>
      </section>

      <!-- Categories rendered here -->
      <section id="content" class="stack"></section>

      <section class="card">
        <div class="row row--space row--wrap">
          <div class="muted">ملاحظة: الأقفال والنقاط محفوظة تلقائيًا على نفس الجهاز.</div>
          <a class="btn btn--ghost" href="index.html">رجوع</a>
        </div>
      </section>

    </main>

    <footer class="footer">
      <div class="muted">لا توجد إعلانات/نوافذ منبثقة • تجربة عائلية لطيفة</div>
    </footer>
  </div>

  <script src="js/common.js"></script>
  <script src="js/rounds.js"></script>
</body>
</html>
