<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>لعبة العائلة - الفئات</title>
  <link rel="stylesheet" href="css/style.css?v=11" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand brand--small">
        <img class="brand__logo" src="assets/images/logo.png" alt="الشعار" onerror="this.style.display='none'" />
        <div class="brand__txt">
          <div class="brand__title">اختر الفئة</div>
          <div class="brand__sub" id="sessionLine">—</div>
        </div>
      </div>

      <div class="topbar__actions">
        <button id="btnNewGame" class="btn btn--ghost btn--sm" type="button">لعبة جديدة</button>
        <button id="btnLogout" class="btn btn--ghost btn--sm" type="button">تسجيل خروج</button>
      </div>
    </header>

    <main class="container">
      <section class="card">
        <div class="row row--space row--wrap">
          <div class="scorebar" id="scorebar"></div>
        </div>
      </section>

      <section class="card">
        <div class="card__title">الفئات</div>
        <div class="muted">اختر فئة ثم اختر الجولة المطلوبة.</div>

        <div class="divider"></div>

        <div class="stack" id="categoriesWrap"></div>

        <div class="divider"></div>

        <div class="row row--space row--wrap">
          <a class="btn btn--ghost" href="index.html">رجوع</a>

          <!-- ✅ زر جديد -->
          <button id="btnUnlockAll" class="btn btn--soft" type="button">فتح جميع الأسئلة المقفولة</button>
        </div>
      </section>
    </main>

    <footer class="footer">
      <div class="muted">تصميم عربي • تجربة عائلية</div>
    </footer>
  </div>

  <script src="js/common.js?v=11"></script>
  <script src="js/rounds.js?v=11"></script>
</body>
</html>
