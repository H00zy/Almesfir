<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>لعبة العائلة - اختيار الجولة</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand brand--small">
        <img class="brand__logo" src="assets/images/logo.png" alt="الشعار" onerror="this.style.display='none'" />
        <div class="brand__txt">
          <div class="brand__title">اختيار الجولة</div>
          <div class="brand__sub" id="sessionLine">—</div>
        </div>
      </div>

      <div class="topbar__actions">
        <button id="btnNewGame" class="btn btn--ghost btn--sm" type="button">New Game</button>
        <button id="btnLogout" class="btn btn--ghost btn--sm" type="button">Logout</button>
      </div>
    </header>

    <main class="container">
      <section class="card">
        <div class="row row--space row--wrap">
          <div>
            <div class="card__title">اختر فئة ثم Round</div>
            <div class="muted">الفئات/الجولات تأتي من ملف JSON الخاص بالتحدي المختار.</div>
          </div>

          <div class="scorebar" id="scorebar">
            <!-- filled by JS -->
          </div>
        </div>
      </section>

      <section id="content" class="grid grid--auto">
        <!-- categories + rounds generated here -->
      </section>

      <section class="card">
        <div class="row row--space row--wrap">
          <div class="muted">تقدر ترجع لأي فئة، لكن الـ rounds/الأسئلة المقفلة تظل مقفلة.</div>
          <div class="row">
            <a class="btn btn--ghost" href="index.html">رجوع للدخول</a>
          </div>
        </div>
      </section>
    </main>

    <footer class="footer">
      <div class="muted">جلسة محفوظة محليًا عبر localStorage</div>
    </footer>
  </div>

  <script src="js/common.js"></script>
  <script src="js/rounds.js"></script>
</body>
</html>
