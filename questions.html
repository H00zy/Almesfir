<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>لعبة العائلة - الأسئلة</title>
  <link rel="stylesheet" href="css/style.css?v=10" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand brand--small">
        <img class="brand__logo" src="assets/images/logo.png" alt="الشعار" onerror="this.style.display='none'" />
        <div class="brand__txt">
          <div class="brand__title" id="pageTitle">قائمة الأسئلة</div>
          <div class="brand__sub" id="sessionLine">—</div>
        </div>
      </div>

      <div class="topbar__actions">
        <button id="btnNewGame" class="btn btn--ghost btn--sm" type="button">لعبة جديدة</button>
        <button id="btnLogout" class="btn btn--ghost btn--sm" type="button">تسجيل خروج</button>
      </div>
    </header>

    <main class="container">

      <section class="card">
        <div class="row row--space row--wrap">
          <div class="scorebar" id="scorebar"></div>
          <div class="row row--wrap">
            <a class="btn btn--ghost btn--sm" href="rounds.html">رجوع للفئات</a>
          </div>
        </div>
      </section>

      <section class="card">
        <div class="row row--space row--wrap">
          <div>
            <div class="card__title" id="roundTitle">—</div>
            <div class="muted">اختر الفريق لكل سؤال، ثم افتح السؤال للعب.</div>
          </div>
          <div class="pill">القيمة: <span id="pointsVal">10</span> نقاط</div>
        </div>

        <div class="divider"></div>

        <div class="grid grid--2" id="questionsGrid"></div>

        <div class="divider"></div>

        <div class="muted">ملاحظة: بعد استخدام السؤال يتم قفله ولا يمكن فتحه مرة ثانية.</div>
      </section>

    </main>

    <footer class="footer">
      <div class="muted">تصميم عربي • تجربة عائلية</div>
    </footer>
  </div>

  <script src="js/common.js?v=10"></script>
  <script src="js/questions.js?v=10"></script>
</body>
</html>
