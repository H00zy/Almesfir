<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>لعبة العائلة - قائمة الأسئلة</title>
  <link rel="stylesheet" href="css/style.css?v=3" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand brand--small">
        <img class="brand__logo" src="assets/images/logo.png" alt="الشعار" onerror="this.style.display='none'" />
        <div class="brand__txt">
          <div class="brand__title">قائمة الأسئلة</div>
          <div class="brand__sub" id="sessionLine">—</div>
        </div>
      </div>

      <div class="topbar__actions">
        <button id="btnNewGame" class="btn btn--ghost btn--sm" type="button">لعبة جديدة</button>
        <button id="btnLogout" class="btn btn--ghost btn--sm" type="button">تسجيل خروج</button>
      </div>
    </header>

    <main class="container">

      <section class="card">
        <div class="row row--space row--wrap">
          <div>
            <div class="card__title" id="roundTitle">—</div>
            <div class="muted" id="roundHint">—</div>
          </div>

          <div class="scorebar" id="scorebar"></div>
        </div>
      </section>

      <section class="card">
        <div class="row row--space row--wrap" style="gap:12px">
          <div class="row row--wrap">
            <span class="pill pill--soft">الخطوة 1: عيّن السؤال للفريق</span>
            <span class="pill pill--soft">الخطوة 2: افتح السؤال</span>
            <span class="pill pill--soft">الخطوة 3: من شاشة اللعب امنح النقاط/بدّل الفريق</span>
          </div>

          <a class="btn btn--ghost btn--sm" href="rounds.html">تغيير الجولة</a>
        </div>
      </section>

      <section class="grid grid--2" id="questionsGrid"></section>

      <section class="card" id="finishCard" style="display:none;">
        <div class="card__title">انتهت جميع الأسئلة 🎉</div>
        <div class="muted" id="winnerLine">—</div>
        <div class="divider"></div>
        <div class="row row--wrap">
          <button id="btnNewGame2" class="btn btn--primary" type="button">ابدأ لعبة جديدة</button>
          <button id="btnLogout2" class="btn btn--ghost" type="button">تسجيل خروج</button>
        </div>
      </section>

      <section class="card">
        <div class="row row--space row--wrap">
          <div class="muted">ملاحظة: السؤال بعد استخدامه يُقفل ولا يمكن فتحه مرة ثانية.</div>
          <a class="btn btn--ghost" href="rounds.html">رجوع</a>
        </div>
      </section>

    </main>

    <footer class="footer">
      <div class="muted">واجهة عربية • بدون نوافذ منبثقة</div>
    </footer>
  </div>

  <script src="js/common.js?v=3"></script>
  <script src="js/questions.js?v=3"></script>
</body>
</html>
